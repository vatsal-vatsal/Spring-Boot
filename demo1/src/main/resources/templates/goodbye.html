<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .message {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #f093fb;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin: 10px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e084e0;
        }
        .nav-links {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Goodbye <span th:text="${name}">World</span>! </h1>
        <div class="message">
            Thanks for visiting your Spring Boot application! Hope to see you again soon.
        </div>
        
        <div class="nav-links">
            <a href="/hello" class="btn">Say Hello</a>
            <a href="/users" class="btn">View Users</a>
            <a href="/add-user-form" class="btn">Add User</a>
        </div>
    </div>
</body>
</html>
