# ===================================================================
# Spring Boot Application Configuration
# ===================================================================

# Application name - Used for logging and identification
spring.application.name=demo1

# ===================================================================
# Database Connection Settings (XAMPP MariaDB)
# ===================================================================

# XAMPP MySQL/MariaDB Connection Settings
# Database URL format: jdbc:mysql://host:port/database?parameters
# Parameters explained:
#   createDatabaseIfNotExist=true - Auto-create database if it doesn't exist
#   useSSL=false - Disable SSL for local development
#   allowPublicKeyRetrieval=true - Allow public key retrieval for authentication
#   serverTimezone=UTC - Set timezone to prevent connection issues
spring.datasource.url=jdbc:mysql://localhost:3306/test?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Database credentials for XAMPP
# XAMPP default: username=root, password=empty
spring.datasource.username=root
spring.datasource.password=

# ===================================================================
# JPA / Hibernate Settings
# ===================================================================

# DDL (Data Definition Language) Auto-generation Strategy
# create: Drop and recreate tables on startup (good for development)
# update: Update existing schema (good for production)
# validate: Only validate schema (don't make changes)
# none: Don't do anything with schema
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console - Great for learning and debugging
# true: Shows all SQL statements executed by Hibernate
# false: Hides SQL statements (production setting)
spring.jpa.show-sql=true

# Database dialect - Tells Hibernate which SQL flavor to generate
# MariaDBDialect: Optimized for MariaDB (used in XAMPP)
# MySQLDialect: For MySQL databases
# Hibernate can auto-detect, but explicit is clearer
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect